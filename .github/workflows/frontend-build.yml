name: Frontend Build

on:
  push:
    branches: [ master, develop ]
    paths:
      - 'frontend/**'
      - 'admin-panel/**'
  pull_request:
    branches: [ master ]

jobs:
  build-frontend:
    runs-on: ubuntu-latest
    name: Build Frontend (Lit + TypeScript)

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ./frontend

      - name: Type check
        run: npx tsc --noEmit
        working-directory: ./frontend

      - name: Build
        run: npm run build
        working-directory: ./frontend
        env:
          VITE_API_URL: http://localhost:8080/api

  build-admin:
    runs-on: ubuntu-latest
    name: Build Admin Panel (React + TypeScript)

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: admin-panel/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ./admin-panel

      - name: Build
        run: npm run build
        working-directory: ./admin-panel
        env:
          VITE_API_URL: http://localhost:8080/api
